<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A4 3D View</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <h1>&#21322;&#22278;&#26609;&#38754;</h1>
        <div class="control-board">
          <section class="control-panel">
            <h2>&#22278;&#26609;</h2>
            <div class="control-grid">
              <label>
                &#22278;&#24515; x
                <input id="centerX" type="number" value="105" step="1" />
              </label>
              <label>
                &#22278;&#24515; y
                <input id="centerY" type="number" value="120" step="1" />
              </label>
              <label>
                &#39640;&#24230;
                <input id="cylinderHeight" type="number" value="90" step="1" min="0" />
              </label>
              <label>
                &#21322;&#24452; R
                <input id="cylinderRadius" type="number" value="35" step="1" min="0" />
              </label>
            </div>
          </section>
          <section class="control-panel">
            <h2>&#20809;&#32447;&#19982;&#35266;&#23519;</h2>
            <div class="control-grid">
              <label>
                theta
                <input id="lightTheta" type="number" value="20" step="1" min="-85" max="85" />
              </label>
              <label>
                &#35266;&#23519;&#28857; y
                <input id="observerY" type="number" value="260" step="1" />
              </label>
              <label>
                &#35266;&#23519;&#28857; z
                <input id="observerZ" type="number" value="55" step="1" />
              </label>
            </div>
          </section>
          <section class="control-panel">
            <h2>&#22270;&#29255;</h2>
            <div class="control-grid">
              <label>
                &#22270;&#29255; y
                <input id="imageY" type="number" value="210" step="1" />
              </label>
              <label>
                &#24213;&#36793; z
                <input id="imageBottomZ" type="number" value="0" step="1" />
              </label>
              <label>
                &#39640;&#24230;
                <input id="imageHeight" type="number" value="90" step="1" min="1" />
              </label>
            </div>
          </section>
        </div>
        <section class="image-picker">
          <label>
            &#21407;&#22270;&#29255;&#25991;&#20214;
            <input id="imageFile" type="file" accept="image/*" />
          </label>
          <input id="imagePath" class="path-display" type="text" value="&#26410;&#36873;&#25321;&#22270;&#29255;" readonly />
          <div class="image-preview">
            <img id="imagePreview" alt="&#21407;&#22270;&#29255;&#39044;&#35272;" />
            <span id="imageEmpty">&#21407;&#22270;&#29255;&#39044;&#35272;</span>
          </div>
        </section>
        <section class="paper-output">
          <h2>A4 &#32440;&#38754;&#22270;&#20687;</h2>
          <div class="paper-preview">
            <canvas id="paperPreview" width="420" height="594" aria-label="A4 paper image preview"></canvas>
            <span id="paperEmpty">&#31561;&#24453;&#29983;&#25104;&#32440;&#38754;&#22270;&#20687;</span>
          </div>
          <button id="exportPaper" type="button" disabled>&#23548;&#20986; PNG</button>
          <p id="exportStatus" class="export-status"></p>
        </section>
      </aside>
      <canvas id="scene" aria-label="A4 3D scene"></canvas>
    </main>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
